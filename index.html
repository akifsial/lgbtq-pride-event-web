<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME TO PRIDE MONTH</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="box-one">
        <p class="site-text">www.nickelfox.com</p>
        <div class="box-two">
            <div class="box-three">
                <div class="nav-bar">
                  <div class="first-btns">
                    <a href="#">HOME</a>
                    <div class="circle"></div>
                    <a href="#">GET A TICKET</a>
                    <div class="circle"></div>
                    <a href="#">ABOUT US</a>
                  </div>
                  <div class="second-btns">
                    <a href="#">LOGIN</a>
                  </div>
                </div>
                <img class="rainbowone" src="images/svgs/rainbowone.svg">
                <img class="prideimage" src="images/svgs/prideimage.svg">
                <img class="rainbowtwo" src="images/svgs/rainbowtwo.svg">
                <img class="pride-image" src="images/svgs/PRIDE.svg">
                <img class="staricon" src="images/svgs/staricon.svg">
                <img class="hearticon" src="images/svgs/hearticon.svg">
                <img class="triangle" src="images/svgs/triangle.svg">
                <img class="loveicon" src="images/svgs/loveicon.svg">
                <div class="right-text">
                 <p>Join us for a vibrant celebration of Pride.
                  Connect, learn, and celebrate diversity in a safe and inclusive space.
                  Register now for this empowering event!</p>
               </div>
               <div class="big-btn">
                 <div class="add-btn">
                   <p>Add To Calender</p>
                   <div class="arrowicon"><img src="images/svgs/arrowicon.svg"></div>
                 </div>
               </div>
                 <div class="box-four">
                    <div class="icons-text">
                        <div class="icons">
                            <p>Share :</p>
                            <img src="images/svgs/whatsappicon.svg">
                            <img src="images/svgs/twtricon.svg">
                            <img src="images/svgs/fbicon.svg">
                            <img src="images/svgs/instaicon.svg">
                        </div>
                        <div class="texts">3,109,258 Joined Already </div>
                    </div>
                    <div class="search-box">
                      <input type="text" class="search-input" placeholder="Enter your email address">
                    </div>
                 </div>
               </div>
            </div>
        </div>
    </div>
</body>
</html>
